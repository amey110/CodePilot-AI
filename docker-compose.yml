version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: code_reviewer_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_reviewer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d code_reviewer"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: code_reviewer_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: code_reviewer_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
